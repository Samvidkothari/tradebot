{% extends "command_base.html" %}
{% block title %}Charts{% endblock %}
{% block content %}
<style>
  .chart-sel{background:var(--elev);border:1px solid var(--line);border-radius:8px;color:var(--ink);
    font-family:var(--sans);font-size:12.5px;font-weight:600;padding:7px 11px;cursor:pointer}
  .chart-sel:focus{outline:none;border-color:var(--ink-3)}
  #tvchart{height:calc(100vh - 176px);min-height:520px;border-radius:11px;overflow:hidden}
  .tvfoot{font-size:10.5px;color:var(--ink-4);margin-top:8px}
  .tvfoot a{color:var(--ink-3)}
</style>

<div class="vhead">
  <div><h1>Charts</h1><div class="sub">Live interactive charts · NSE · powered by TradingView</div></div>
  <div class="tools">
    <select id="sym" class="chart-sel">
      {% for o in options %}<option value="{{ o.tv }}">{{ o.sym }}</option>{% endfor %}
    </select>
  </div>
</div>

<div class="panel" style="padding:6px">
  <div id="tvchart" class="tradingview-widget-container"></div>
</div>
<div class="tvfoot">Charts by <a href="https://www.tradingview.com/symbols/NSE-NIFTY/" target="_blank" rel="noopener">TradingView</a>. NSE data is TradingView's, independent of the app's yfinance ledgers — reference only, places no orders.</div>

<script>
(function(){
  var host = document.getElementById('tvchart');
  var sel = document.getElementById('sym');
  function render(symbol){
    // Current TradingView embed: a fresh script per symbol, config as JSON in its
    // body. Minimal, documented options only — extra props make the widget fall
    // back to its AAPL demo.
    host.innerHTML = '<div class="tradingview-widget-container__widget" style="height:100%;width:100%"></div>';
    var s = document.createElement('script');
    s.type = 'text/javascript';
    s.async = true;
    s.src = 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
    s.text = JSON.stringify({
      autosize: true, symbol: symbol, interval: 'D', timezone: 'Asia/Kolkata',
      theme: 'dark', style: '1', locale: 'in', allow_symbol_change: true,
      hide_side_toolbar: false, support_host: 'https://www.tradingview.com'
    });
    host.appendChild(s);
  }
  sel.addEventListener('change', function(){ render(this.value); });
  render(sel.value);
})();
</script>
{% endblock %}
