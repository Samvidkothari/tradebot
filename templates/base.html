<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>tradebot — {% block title %}Dashboard{% endblock %}</title>
  <style>
    :root {
      --bg: #0d1117; --panel: #161b22; --border: #21262d;
      --text: #e6edf3; --muted: #8b949e; --accent: #4f8cff;
      --green: #3fb950; --red: #f85149;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex; min-height: 100vh;
    }
    aside {
      width: 220px; background: var(--panel); border-right: 1px solid var(--border);
      padding: 24px 0; position: fixed; top: 0; bottom: 0;
    }
    .brand { font-size: 20px; font-weight: 700; padding: 0 24px 20px;
             border-bottom: 1px solid var(--border); }
    .brand span { color: var(--accent); }
    .brand small { display: block; color: var(--muted); font-size: 11px;
                   font-weight: 400; margin-top: 2px; }
    nav { margin-top: 16px; }
    nav a {
      display: block; padding: 10px 24px; color: var(--muted);
      text-decoration: none; border-left: 3px solid transparent;
    }
    nav a:hover { color: var(--text); }
    nav a.active { color: var(--text); border-left-color: var(--accent);
                   background: rgba(79,140,255,.08); }
    .logout { position: absolute; bottom: 24px; left: 24px; }
    .logout a { color: var(--muted); font-size: 13px; text-decoration: none; }
    main { margin-left: 220px; flex: 1; padding: 32px 40px; max-width: 1200px; }
    h1 { font-size: 22px; margin-bottom: 4px; }
    .sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
             gap: 16px; margin-bottom: 28px; }
    .card { background: var(--panel); border: 1px solid var(--border);
            border-radius: 10px; padding: 18px 20px; }
    .card .label { color: var(--muted); font-size: 12px; text-transform: uppercase;
                   letter-spacing: .5px; }
    .card .value { font-size: 24px; font-weight: 600; margin-top: 6px; }
    table { width: 100%; border-collapse: collapse; background: var(--panel);
            border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    th, td { padding: 10px 14px; text-align: right; font-size: 14px; }
    th:first-child, td:first-child { text-align: left; }
    th { background: rgba(255,255,255,.03); color: var(--muted); font-size: 12px;
         text-transform: uppercase; letter-spacing: .5px; }
    tr + tr td { border-top: 1px solid var(--border); }
    .green { color: var(--green); } .red { color: var(--red); }
    .banner { background: rgba(248,81,73,.1); border: 1px solid rgba(248,81,73,.4);
              color: #ffb4ae; padding: 14px 18px; border-radius: 10px;
              margin-bottom: 24px; white-space: pre-line; }
    .banner code { background: rgba(255,255,255,.08); padding: 1px 6px;
                   border-radius: 4px; }
    .empty { color: var(--muted); padding: 24px; text-align: center; }
    section { margin-bottom: 36px; }
    h2 { font-size: 15px; color: var(--muted); text-transform: uppercase;
         letter-spacing: .5px; margin-bottom: 12px; }
    .readonly { display: inline-block; font-size: 11px; color: var(--green);
                border: 1px solid var(--green); border-radius: 20px;
                padding: 1px 10px; margin-left: 10px; vertical-align: middle; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <aside>
    <div class="brand">tradebot<span>.</span><small>personal trading console</small></div>
    <nav>
      <a href="{{ url_for('overview') }}"  class="{{ 'active' if active == 'overview' }}">Live Portfolio</a>
      <a href="{{ url_for('paper') }}"     class="{{ 'active' if active == 'paper' }}">Paper Trader</a>
      <a href="{{ url_for('charts') }}"    class="{{ 'active' if active == 'charts' }}">Charts</a>
      <a href="{{ url_for('backtests') }}" class="{{ 'active' if active == 'backtests' }}">Backtests</a>
    </nav>
    <div class="logout"><a href="{{ url_for('logout') }}">Sign out</a></div>
  </aside>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
