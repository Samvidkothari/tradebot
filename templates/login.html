<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>tradebot — Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0a0c11; --panel:#12151d; --elev:#161a24; --border:#232a37;
            --text:#e7eaf0; --muted:#8a93a3; --faint:#5b6373;
            --accent:#7c8cff; --accent-2:#caa45d; --red:#f0716a; }
    * { box-sizing:border-box; margin:0; padding:0; }
    html { -webkit-font-smoothing:antialiased; }
    body {
      background:var(--bg); color:var(--text); min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      font-family:"Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size:15px; letter-spacing:-0.006em;
      background-image:
        radial-gradient(700px 460px at 30% 0%, rgba(124,140,255,.14), transparent 60%),
        radial-gradient(620px 420px at 80% 100%, rgba(202,164,93,.08), transparent 55%);
    }
    .box {
      background:linear-gradient(180deg, var(--elev), var(--panel));
      border:1px solid var(--border); border-radius:18px; padding:40px;
      width:380px; box-shadow:0 1px 2px rgba(0,0,0,.4), 0 24px 60px rgba(0,0,0,.45);
    }
    h1 { font-family:"Fraunces", Georgia, serif; font-size:30px; font-weight:600;
         letter-spacing:-0.02em; margin-bottom:4px; }
    h1 span { color:var(--accent-2); }
    p.sub { color:var(--muted); font-size:12px; letter-spacing:.12em;
            text-transform:uppercase; margin-bottom:28px; }
    input {
      width:100%; padding:12px 15px; border-radius:10px; font-size:15px;
      border:1px solid var(--border); background:rgba(0,0,0,.25);
      color:var(--text); margin-bottom:14px; transition:border-color .18s ease, box-shadow .18s ease;
    }
    input::placeholder { color:var(--faint); }
    input:focus { outline:none; border-color:var(--accent);
                  box-shadow:0 0 0 3px rgba(124,140,255,.18); }
    button {
      width:100%; padding:12px; border:none; border-radius:10px;
      background:linear-gradient(180deg, #8b99ff, var(--accent));
      color:#0a0c11; font-family:"Inter", sans-serif; font-size:15px;
      font-weight:600; cursor:pointer; transition:filter .18s ease, transform .05s ease;
    }
    button:hover { filter:brightness(1.07); }
    button:active { transform:translateY(1px); }
    .err { color:var(--red); font-size:13px; margin-bottom:14px; }
    .warn { color:var(--muted); font-size:13px; margin-bottom:16px;
            border:1px solid var(--border); border-radius:10px; padding:11px 13px;
            background:rgba(0,0,0,.2); }
    code { background:rgba(255,255,255,.09); padding:1px 6px; border-radius:5px; }
  </style>
</head>
<body>
  <div class="box">
    <h1>tradebot<span>.</span></h1>
    <p class="sub">Trading Console — Read-only</p>
    {% if not configured %}
      <div class="warn">
        No password configured yet. Add this line to your <code>.env</code> file,
        then restart the dashboard:<br><br>
        <code>DASHBOARD_PASSWORD=choose-something</code>
      </div>
    {% endif %}
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <form method="post">
      <input type="password" name="password" placeholder="Password" autofocus>
      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
