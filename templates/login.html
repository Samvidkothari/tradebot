<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>tradebot — Sign in</title>
  <style>
    :root { --bg:#0d1117; --panel:#161b22; --border:#21262d; --text:#e6edf3;
            --muted:#8b949e; --accent:#4f8cff; --red:#f85149; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); min-height:100vh;
           display:flex; align-items:center; justify-content:center;
           font:15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .box { background:var(--panel); border:1px solid var(--border);
           border-radius:12px; padding:36px; width:360px; }
    h1 { font-size:24px; margin-bottom:4px; } h1 span { color:var(--accent); }
    p.sub { color:var(--muted); font-size:13px; margin-bottom:24px; }
    input { width:100%; padding:11px 14px; border-radius:8px; font-size:15px;
            border:1px solid var(--border); background:var(--bg);
            color:var(--text); margin-bottom:14px; }
    input:focus { outline:none; border-color:var(--accent); }
    button { width:100%; padding:11px; border:none; border-radius:8px;
             background:var(--accent); color:#fff; font-size:15px;
             font-weight:600; cursor:pointer; }
    button:hover { filter:brightness(1.1); }
    .err { color:var(--red); font-size:13px; margin-bottom:14px; }
    .warn { color:var(--muted); font-size:13px; margin-bottom:14px;
            border:1px solid var(--border); border-radius:8px; padding:10px 12px; }
    code { background:rgba(255,255,255,.08); padding:1px 6px; border-radius:4px; }
  </style>
</head>
<body>
  <div class="box">
    <h1>tradebot<span>.</span></h1>
    <p class="sub">Personal trading console — read-only</p>
    {% if not configured %}
      <div class="warn">
        No password configured yet. Add this line to your <code>.env</code> file,
        then restart the dashboard:<br><br>
        <code>DASHBOARD_PASSWORD=choose-something</code>
      </div>
    {% endif %}
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <form method="post">
      <input type="password" name="password" placeholder="Password" autofocus>
      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
